<!DOCTYPE html>
<html>
<head>
    <title>Asset Inventory</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
        }

        .form {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            max-width: 900px;
            margin: 0 auto 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .form input {
            margin: 5px 10px 10px 0;
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid #ccc;
            width: calc(20% - 12px);
            box-sizing: border-box;
        }

        .form button {
            margin: 5px 5px 0 0;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            background-color: #3498db;
            color: #fff;
            cursor: pointer;
            transition: background 0.3s;
        }

        .form button:hover {
            background-color: #2980b9;
        }

        input#search {
            width: 95%;
            max-width: 900px;
            display: block;
            margin: 0 auto 20px;
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        table {
            width: 95%;
            max-width: 900px;
            margin: 0 auto;
            border-collapse: collapse;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }

        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background-color: #3498db;
            color: #fff;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tr.imported {
            background-color: #fff3cd !important;
        }

        tr:hover {
            background-color: #d6eaf8 !important;
        }

        button {
            font-size: 0.9em;
        }

        h3 {
            text-align: center;
            color: #2c3e50;
        }

        a#downloadScript {
            display: inline-block;
            margin: 0 auto;
            text-align: center;
            padding: 8px 16px;
            background: #2ecc71;
            color: #fff;
            border-radius: 4px;
            text-decoration: none;
            transition: background 0.3s;
        }

        a#downloadScript:hover {
            background: #27ae60;
        }

        @media (max-width: 768px) {
            .form input {
                width: 100%;
                margin-right: 0;
            }

            input#search, table {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<h1>Asset Inventory System</h1>

<div class="form">
    <input type="text" id="assetId" placeholder="Asset ID">
    <input type="text" id="device" placeholder="Device Name / Hostname">
    <input type="text" id="model" placeholder="Model">
    <input type="text" id="serial" placeholder="Serial Number">
    <input type="text" id="user" placeholder="Assigned To">

    <br><br>
    <button onclick="addAsset()">Add Asset</button>
    <button onclick="exportCSV()">Export CSV</button>
</div>

<h3>Import Computer Info (.txt)</h3>
<div style="text-align:center;">
    <input type="file" id="importFile" accept=".txt">
    <button onclick="importTxt()">Import PC Info</button>
</div>

<input type="text" id="search" placeholder="Search assets...">

<table id="assetTable">
    <thead>
        <tr>
            <th>Asset ID</th>
            <th>Device</th>
            <th>Model</th>
            <th>Serial</th>
            <th>User</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<h3>Download PC Info Script</h3>
<div style="text-align:center;">
    <a id="downloadScript" href="#">Download Script</a>
</div>

<script src="script.js"></script>
</body>
</html>
