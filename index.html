<!DOCTYPE html>
<html>
<head>
    <title>Asset Inventory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Login Overlay -->
<div id="loginOverlay">
    <div class="login-box">
        <h2>Login</h2>
        <input type="text" id="loginUsername" placeholder="Username">
        <input type="password" id="loginPassword" placeholder="Password">
        <button type="button" onclick="checkLogin()">Login</button>
        <p id="loginError" style="color:red; display:none;">Invalid credentials</p>
    </div>
</div>

<h1>Asset Inventory System</h1>

<div class="form">
    <input type="text" id="assetId" placeholder="Asset ID">
    <input type="text" id="hostname" placeholder="Hostname">
    <input type="text" id="model" placeholder="Model">
    <input type="text" id="serial" placeholder="Serial Number">
    <input type="text" id="user" placeholder="Assigned To">
    <br><br>
    <button onclick="addAsset()">Add Asset</button>
    <button onclick="exportCSV()">Export CSV</button>
</div>

<h3>Import Computer Info (.txt)</h3>
<div class="import-section">
    <input type="file" id="importFile" accept=".txt">
    <button onclick="importTxt()">Import PC Info</button>
</div>

<input type="text" id="search" placeholder="Search assets..." oninput="searchAsset()">

<table id="assetTable">
    <thead>
        <tr>
            <th>Asset ID</th>
            <th>Hostname</th>
            <th>Model</th>
            <th>Serial</th>
            <th>User</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<h3>Download PC Info Script</h3>
<div class="download-section">
    <a id="downloadScript" href="#">Download Script</a>
</div>

<script src="script.js"></script>
</body>
</html>
