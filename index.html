<!DOCTYPE html>
<html>
<head>
    <title>Asset Inventory</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form input { margin: 5px; padding: 5px; }
        .form button { margin: 5px; padding: 5px 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        th { background: #f4f4f4; }
        .imported { background-color: #fff3cd; } /* Highlight missing AssetID/User */
    </style>
</head>
<body>

<h1>Asset Inventory System</h1>

<div class="form">
    <input type="text" id="assetId" placeholder="Asset ID">
    <input type="text" id="device" placeholder="Device Name / Hostname">
    <input type="text" id="model" placeholder="Model">
    <input type="text" id="serial" placeholder="Serial Number">
    <input type="text" id="user" placeholder="Assigned To">

    <br><br>
    <button onclick="addAsset()">Add Asset</button>
    <button onclick="exportCSV()">Export CSV</button>
</div>

<br>

<h3>Import Computer Info (.txt)</h3>
<input type="file" id="importFile" accept=".txt">
<button onclick="importTxt()">Import PC Info</button>

<br><br>
<input type="text" id="search" placeholder="Search assets..." onkeyup="searchAsset()">

<table id="assetTable">
    <thead>
        <tr>
            <th>Asset ID</th>
            <th>Device</th>
            <th>Model</th>
            <th>Serial</th>
            <th>User</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<br>
<h3>Download PC Info Script</h3>
<a id="downloadScript" href="#">Download Script</a>

<script src="script.js"></script>
</body>
</html>
