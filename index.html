<!DOCTYPE html>
<html>
<head>
    <title>Asset Inventory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Asset Inventory System</h1>

<div class="form">
    <input type="text" id="assetId" placeholder="Asset ID">
    <input type="text" id="device" placeholder="Device Name / Hostname">
    <input type="text" id="model" placeholder="Model">
    <input type="text" id="serial" placeholder="Serial Number">
    <input type="text" id="user" placeholder="Assigned To">
    <br><br>
    <button onclick="addAsset()">Add Asset</button>
    <button onclick="exportCSV()">Export CSV</button>
</div>

<h3>Import Computer Info (.txt)</h3>
<div class="import-section">
    <input type="file" id="importFile" accept=".txt">
    <button onclick="importTxt()">Import PC Info</button>
</div>

<input type="text" id="search" placeholder="Search assets...">

<table id="assetTable">
    <thead>
        <tr>
            <th>Asset ID</th>
            <th>Device</th>
            <th>Model</th>
            <th>Serial</th>
            <th>User</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<h3>Download PC Info Script</h3>
<div class="download-section">
    <a id="downloadScript" href="#">Download Script</a>
</div>

<!-- Password Modal -->
<div id="passwordModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h3>Enter Password</h3>
    <input type="password" id="modalPassword" placeholder="Password">
    <button onclick="submitPassword()">Submit</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
