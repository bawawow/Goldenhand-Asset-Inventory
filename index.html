<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Asset Inventory System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Asset Inventory System</h1>

        <!-- Form to add/edit assets -->
        <div class="form">
            <input type="text" id="assetId" placeholder="Asset ID">
            <input type="text" id="device" placeholder="Device Name / Hostname">
            <input type="text" id="brand" placeholder="Brand">
            <input type="text" id="serial" placeholder="Serial Number">
            <input type="text" id="user" placeholder="Assigned To">

            <div class="buttons">
                <button onclick="addAsset()">Add Asset</button>
                <button onclick="exportCSV()">Export CSV</button>
            </div>
        </div>

        <!-- Import section -->
        <h3>Import Computer Info (.txt)</h3>
        <input type="file" id="importFile" accept=".txt">
        <button onclick="importTxt()">Import PC Info</button>

        <!-- Search -->
        <input type="text" id="search" placeholder="Search assets..." onkeyup="searchAsset()">

        <!-- Asset table -->
        <table id="assetTable">
            <thead>
                <tr>
                    <th>Asset ID</th>
                    <th>Device</th>
                    <th>Brand</th>
                    <th>Serial</th>
                    <th>User</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
